package: qtbase5-dev

essential:
  - qtbase5-dev_copyright

slices:
  copyright:
    contents:
      /usr/share/doc/qtbase5-dev/copyright:

  core:
    contents:
      /usr/include/*-linux-*/qt6/**:
      /usr/lib/*-linux-*/cmake/qt6/**:
      /usr/lib/*-linux-*/libqt6OpenGLExtensions.a:
      /usr/lib/*-linux-*/libqt6OpenGLExtensions.prl:
      /usr/lib/*-linux-*/metatypes/*.json:
      /usr/lib/*-linux-*/pkgconfig/**:
      /usr/lib/*-linux-*/qt6/bin/*:
      /usr/lib/*-linux-*/qt6/mkspecs/**:
    essential:
      - libqt6core6t64_libs

  doc:
    contents:
      /usr/share/doc/qtbase5-dev/changelog.Debian.gz:
      /usr/share/qt6/doc/**:
